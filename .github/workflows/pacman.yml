name: Generate Pac-Man Animation

on:
  schedule: # Se ejecuta automáticamente todos los días a la medianoche
    - cron: "0 0 * * *" 
  workflow_dispatch: # Te permite ejecutarlo manualmente cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Paso 1: Clonar el repositorio
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Paso 2: Generar el archivo animado de Pacman usando el generador de la comunidad
      - name: Generate Pacman SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: axlgoze
          template: classic
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # Muestra los últimos 6 meses para que Pac-Man se mueva rápido y estético
          output_action: commit
          committer_branch: output
          committer_message: "chore: update pacman animation [skip ci]"
          filename: github-contribution-grid-pacman.svg
